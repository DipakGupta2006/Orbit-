<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitAI · Login & Register</title>
        <link rel="icon" type="image/png" href="/saturn.png">

    <style>
        /* reset & base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 30%, #0b1f1a, #0a0f0e 80%);
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        /* ---------- starfield (twinkling dots) ---------- */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 3px;
            height: 3px;
            opacity: 0.7;
            box-shadow: 0 0 6px 1px rgba(255, 255, 255, 0.3);
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                transform: scale(0.6);
                opacity: 0.3;
            }

            100% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        /* ---------- falling comets (meteor shower) ---------- */
        .comet-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .comet {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(200, 255, 220, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 12px 4px rgba(120, 255, 180, 0.6);
            animation: fall linear forwards;
            opacity: 0;
        }

        .comet::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, rgba(180, 255, 200, 0.8), transparent);
            transform: rotate(45deg) translateX(-8px);
            border-radius: 100%;
            filter: blur(1px);
        }

        @keyframes fall {
            0% {
                transform: translate(0, 0) scale(0.2);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translate(calc(-200px - 20vw), calc(100vh + 100px)) scale(1.2);
                opacity: 0;
            }
        }

        /* ---------- main card (glass) ---------- */
        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(8, 20, 18, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 48px 48px;
            padding: 2.5rem 2rem 2.2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 30, 20, 0.7), 0 0 0 1px rgba(120, 255, 180, 0.15);
            border: 1px solid rgba(100, 255, 180, 0.2);
            transition: transform 0.25s ease;
        }

        .auth-card:hover {
            transform: scale(1.01);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #b6ffd6, #8affb0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(80, 255, 150, 0.3);
            margin-bottom: 0.25rem;
        }

        .brand p {
            color: rgba(180, 220, 200, 0.7);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .toggle-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .toggle-btn {
            background: transparent;
            border: 1px solid rgba(100, 200, 150, 0.3);
            color: rgba(200, 240, 220, 0.7);
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            background: rgba(10, 30, 25, 0.3);
            letter-spacing: 0.5px;
        }

        .toggle-btn.active {
            background: rgba(80, 220, 160, 0.2);
            border-color: #6bffb0;
            color: #d4ffe6;
            box-shadow: 0 0 20px rgba(70, 255, 150, 0.2);
        }

        .toggle-btn:hover {
            background: rgba(80, 220, 160, 0.15);
            border-color: #80ffb0;
            color: white;
        }

        /* forms */
        .form-container {
            margin-top: 0.5rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .auth-form.hidden {
            display: none;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(0, 20, 15, 0.5);
            border: 1px solid rgba(100, 200, 150, 0.25);
            border-radius: 40px;
            color: #e5f5ed;
            font-size: 1rem;
            transition: 0.25s;
            outline: none;
            backdrop-filter: blur(2px);
        }

        .input-group input:focus {
            border-color: #70ffb0;
            box-shadow: 0 0 25px rgba(70, 255, 160, 0.2), inset 0 0 8px rgba(70, 255, 160, 0.1);
            background: rgba(0, 25, 20, 0.6);
        }

        .input-group input::placeholder {
            color: rgba(160, 200, 180, 0.5);
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #1c5a44, #0e3d30);
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #d4ffea;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(0, 40, 30, 0.6);
            margin-top: 0.5rem;
            border: 1px solid rgba(80, 255, 160, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 200, 120, 0.3);
            background: linear-gradient(145deg, #2b7458, #14503e);
            border-color: #8affb8;
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .extra-links {
            text-align: center;
            margin-top: 0.8rem;
            color: rgba(160, 200, 180, 0.5);
            font-size: 0.9rem;
        }

        .extra-links span {
            color: #78dba8;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            border-bottom: 1px dotted transparent;
        }

        .extra-links span:hover {
            color: #b0ffd0;
            border-bottom-color: #70ffb0;
        }

        /* small message */
        .message {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            min-height: 1.6rem;
            color: #b2ffd0;
            text-shadow: 0 0 8px rgba(70, 255, 150, 0.2);
        }

        /* responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.8rem 1.2rem;
            }

            .brand h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- STARFIELD (twinkling dots) -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- COMET CONTAINER (falling meteors) -->
    <div class="comet-container" id="cometContainer"></div>

    <!-- MAIN CARD -->
    <div class="auth-card">
        <div class="brand">
            <h1>🌌 OrbitAI</h1>
            <p>cosmic intelligence</p>
        </div>

        <!-- toggle buttons -->
        <div class="toggle-buttons">
            <button class="toggle-btn active" id="loginToggle">Login</button>
            <button class="toggle-btn" id="registerToggle">Register</button>
        </div>

        <div class="form-container">
            <!-- LOGIN FORM -->
            <form class="auth-form" id="loginForm" action="/login" method="POST" >
                <div class="input-group">
                    <input type="text" id="loginUsername" name="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">🚀 Launch</button>
                <div class="extra-links">
                    New here? <span id="switchToRegister">create account</span>
                </div>
            </form>

            <!-- REGISTER FORM -->
            <form class="auth-form hidden" id="registerForm" action="/register" method="POST">
                <div class="input-group">
                    <input type="text" id="regUsername" name="username" placeholder="Choose username" required>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" name="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" name="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" name="confirm_password" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn-primary">🪐 Create Orbit</button>
                <div class="extra-links">
                    Already have an account? <span id="switchToLogin">sign in</span>
                </div>
            </form>

            <div class="message" id="messageBox">✦ welcome, traveler ✦</div>
        </div>
    </div>

    <script>
        (function () {
            // ---------- STARS GENERATION ----------
            const starsContainer = document.getElementById('starsContainer');
            const STAR_COUNT = 220;

            for (let i = 0; i < STAR_COUNT; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = 1.5 + Math.random() * 3.5; // 1.5px ~ 5px
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (3 + Math.random() * 5) + 's');
                star.style.animationDelay = (Math.random() * 4) + 's';
                star.style.opacity = 0.3 + Math.random() * 0.7;
                starsContainer.appendChild(star);
            }

            // ---------- COMET (meteor) ----------
            const cometContainer = document.getElementById('cometContainer');

            function spawnComet() {
                const comet = document.createElement('div');
                comet.className = 'comet';
                // random horizontal start (0% ~ 80% so it flies across)
                const startX = Math.random() * 80 + 5;
                const startY = Math.random() * 30 + 2;
                comet.style.left = startX + '%';
                comet.style.top = startY + '%';
                // random size
                const size = 3 + Math.random() * 5;
                comet.style.width = size + 'px';
                comet.style.height = size + 'px';
                // random duration 8~14s
                const duration = 8 + Math.random() * 8;
                comet.style.animationDuration = duration + 's';
                // add slight rotation variation (tail angle)
                const angle = 35 + Math.random() * 20;
                comet.style.setProperty('--angle', angle + 'deg');
                // random delay so they don't all start at once
                comet.style.animationDelay = '0s';
                cometContainer.appendChild(comet);

                // remove comet after animation ends to prevent memory leak
                setTimeout(() => {
                    if (comet.parentNode) comet.remove();
                }, duration * 1000 + 200);
            }

            // initial comets (staggered)
            for (let i = 0; i < 3; i++) {
                setTimeout(spawnComet, i * 1200);
            }

            // comet interval ~10s (but add randomness)
            setInterval(() => {
                spawnComet();
                // sometimes spawn an extra one
                if (Math.random() > 0.5) {
                    setTimeout(spawnComet, 1200);
                }
            }, 10000);

            // also spawn one occasionally outside interval for more life
            setInterval(() => {
                if (Math.random() > 0.4) spawnComet();
            }, 7000);

            // ---------- UI TOGGLE (Login / Register) ----------
            const loginToggle = document.getElementById('loginToggle');
            const registerToggle = document.getElementById('registerToggle');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const switchToRegister = document.getElementById('switchToRegister');
            const switchToLogin = document.getElementById('switchToLogin');
            const messageBox = document.getElementById('messageBox');

            function setActiveForm(formType) {
                if (formType === 'login') {
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                    loginToggle.classList.add('active');
                    registerToggle.classList.remove('active');
                    messageBox.textContent = '✦ welcome back, commander ✦';
                } else {
                    loginForm.classList.add('hidden');
                    registerForm.classList.remove('hidden');
                    registerToggle.classList.add('active');
                    loginToggle.classList.remove('active');
                    messageBox.textContent = '✦ start your orbit journey ✦';
                }
            }

            loginToggle.addEventListener('click', () => setActiveForm('login'));
            registerToggle.addEventListener('click', () => setActiveForm('register'));
            switchToRegister.addEventListener('click', (e) => {
                e.preventDefault();
                setActiveForm('register');
            });
            switchToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                setActiveForm('login');
            });

            // ---------- FAKE AUTH (demo) ----------
            // In real app, this would talk to express + sql backend.
            // Here we simulate login/register with localStorage.

            function showMessage(text, isError = false) {
                messageBox.textContent = text;
                messageBox.style.color = isError ? '#ffb0a0' : '#b2ffd0';
                setTimeout(() => {
                    messageBox.style.color = '#b2ffd0';
                }, 3000);
            }

            // ---------- extra: if user already has account, show login ----------
            // (just set default message)
            setActiveForm('login');

            // small easter: click on brand message resets
            document.querySelector('.brand h1')?.addEventListener('dblclick', function () {
                showMessage('🌠 OrbitAI · ready for launch');
            });

        })();
    </script>
</body>

</html>
